<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Personalized Government Info Portal</title>
  <style>
    :root {
  --primary-blue: #0a3d62;
  --secondary-blue: #1e5f8b;
  --accent-gold: #e3b04b;
  --light-gray: #f8f9fa;
  --medium-gray: #e9ecef;
  --dark-gray: #212529;
  --white: #ffffff;
  --border-radius: 12px;
}



    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--light-gray);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      border-top: 6px solid;
      border-image: linear-gradient(to right, #001a34 40%, #e3b04b) 1;

    }

    .login-container {
      background-color: var(--white);
      padding: 2.5rem;
      border-radius: var(--border-radius);
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 600px;
      margin: auto;
      
      
      position: relative;
      overflow: hidden;
      
    }
    .login-container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary-blue) 40%, var(--accent-gold) 100%);
    }


    .logo {
      height: 60px;
      margin-bottom: 1.5rem;
    }

    h2 {
      color: var(--primary-blue);
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

   h3 {
  color: var(--dark-gray);
  font-size: 1.25rem;
  margin-bottom: 1.5rem;
  font-weight: 500;
  position: relative;
  padding-bottom: 0.75rem;
  text-align: center; /* ✅ This centers the text */
}

    h3::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background-color: var(--accent-gold);
    }

    form {
      margin-top: 1.5rem;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--dark-gray);
      font-weight: 500;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 1px solid var(--medium-gray);
      border-radius: 4px;
      font-size: 1rem;
      margin-bottom: 1.25rem;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 2px rgba(10, 61, 98, 0.15);
      outline: none;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .actions label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .actions input[type="checkbox"] {
      width: auto;
      margin-bottom: 0;
    }

    .actions a {
      color: var(--primary-blue);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .actions a:hover {
      text-decoration: underline;
    }

    button {
      width: 100%;
      padding: 0.875rem;
      background-color: var(--primary-blue);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background-color: var(--secondary-blue);
    }

    .register {
  margin-top: 1.5rem;
  color: var(--dark-gray);
  font-size: 0.95rem;
  text-align: center; /* ✅ Center align */
}


    .register a {
      color: var(--primary-blue);
      text-decoration: none;
      font-weight: 500;
    }

    .register a:hover {
      text-decoration: underline;
    }

   footer {
  margin-top: 2rem;
  color: var(--dark-gray);
  font-size: 0.85rem;
  text-align: center; /* ✅ Center align */
}

    .alert {
  background-color: #ffe8e8;
  color: #a30000;
  padding: 0.75rem 1rem;
  border: 1px solid #ffb3b3;
  border-left: 5px solid #d90429;
  border-radius: 4px;
  font-size: 0.95rem;
  margin-bottom: 1.25rem;
  text-align: left;
}

  </style>
</head>
<body>

  <div class="login-container">
    <img src="{% static 'logo.png' %}" alt="Government Logo" class="logo">
    <h2>Personalized Government<br>Info Portal</h2>
    <h3>Login</h3>

    <form method="POST">
      {% csrf_token %}
      
      {% if error %}
        <div class="alert">
          {{ error }}
        </div>
      {% endif %}

      <label for="username">User Name</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>

      <div class="actions">
        <label><input type="checkbox" name="remember"> Remember me</label>
        <a href="/forgot/">Forgot password?</a>
      </div>

      <button type="submit">Login</button>
    </form>

    <div class="register">
      Don't have an account? <a href="{% url 'register' %}">Register</a>
    </div>

    <footer>
      © 2025 Government Portal. All rights reserved.
    </footer>
  </div>

</body>
</html>
