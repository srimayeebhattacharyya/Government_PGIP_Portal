{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="application-container">
    <h2><i class="fas fa-file-signature"></i> Apply for {{ scheme.name }}</h2>
    
    <div class="scheme-details">
        <h4>Scheme Details:</h4>
        <p>{{ scheme.description }}</p>
        <p><strong>Department:</strong> {{ scheme.department }}</p>
        <p><strong>Benefits:</strong> {{ scheme.benefits }}</p>
    </div>
    
    <form method="post" class="application-form">
        {% csrf_token %}
        <!-- Dynamic form fields based on scheme requirements -->
        <div class="form-group">
            <label>Annual Income</label>
            <input type="number" name="income" required>
        </div>
        
        <div class="form-group">
            <label>Bank Account Details</label>
            <input type="text" name="account_number" placeholder="Account Number" required>
            <input type="text" name="ifsc_code" placeholder="IFSC Code" required>
        </div>
        
        <button type="submit" class="btn btn-primary">Submit Application</button>
    </form>
</div>
{% endblock %}
